spring:
  application:
    name: client
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Schema is created from schema.sql, not generated by Hibernate.
      ddl-auto: none
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false
  sql:
    init:
      # Run schema.sql (DDL) and data.sql (catalogs + demo data) on startup.
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
