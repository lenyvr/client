spring:
  application:
    name: client
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 30000
  jpa:
    hibernate:
      # Schema is created from schema.sql, not generated by Hibernate.
      ddl-auto: none
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false
  sql:
    init:
      # Run schema.sql (DDL) and data.sql (catalogs + demo data) on startup.
      mode: always
  rabbitmq:
    host: ${RBQ_HOST}
    port: ${RBQ_PORT}
    username: ${RBQ_USER}
    password: ${RBQ_PASSWORD}
  springdoc:
    swagger-ui:
      path: /swagger-ui.html