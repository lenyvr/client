services:
  devsu-client-db:
    image: postgres:18-alpine
    container_name: devsu-client-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data_db:/var/lib/postgresql
    networks:
      - devsu-fintech-network

  devsu-client-app:
    image: gradle:8.14-jdk21
    container_name: devsu-client-app
    working_dir: /app
    ports:
      - "${APP_PORT}:8080"
    volumes:
      # Synchronize local code and dependency cache within the container
      - .:/app
      - ~/.gradle:/home/gradle/.gradle
    environment:
      # manage datasource to set up before configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://devsu-client-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    # Command to make Gradle listen for changes (-t) and run backend continuously
    command: ./gradlew :infrastructure:bootRun -t --no-daemon
    depends_on:
      - devsu-client-db # indicates to run first the db
    networks:
      - devsu-fintech-network
  devsu-client-queue:
    image: rabbitmq:3.13-management-alpine
    container_name: devsu-client-queue
    ports:
      # Standar port for application communication (AMQP)
      - "5672:5672"
      # Web interface administration
      - "15672:15672"
    environment:
      # Develop credentials access
      RABBITMQ_DEFAULT_USER: ${RBQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RBQ_PASSWORD}
    volumes:
      # Data persistence to keep queue even if the container is down
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - devsu-fintech-network
networks:
  devsu-fintech-network:
volumes:
  rabbitmq_data: